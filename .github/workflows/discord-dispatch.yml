name: Discord Bot Dispatch

# Fires the bot dispatcher every 5 minutes. Each tick checks every enabled
# subscription, posts any digests whose schedule matches, posts any
# per-event reminders whose lead window includes the next 5 minutes, and
# drains the pending-post retry queue.
#
# Note: GitHub's cron has a 5-minute minimum and runs may be delayed up to
# 15 minutes during peak usage. The dispatcher's idempotency ledger and
# retry queue both tolerate missed/late ticks — for digests the time gate
# is `minute < 5` so a single delayed tick still catches the window; for
# reminders, failed posts queue and back off automatically.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore time gates and fire all enabled subs immediately."
        required: false
        type: boolean
        default: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger PlayIRL.GG dispatcher
        run: |
          URL="https://playirl.gg/api/discord/dispatch"
          if [ "${{ inputs.force }}" = "true" ]; then
            URL="${URL}?force=1"
          fi
          # --retry 3 / --retry-delay 5 / --retry-all-errors swallows
          # transient 5xx responses from Railway (the most common is a
          # 502 when a tick happens to hit a container mid-restart —
          # health-check recycle, OOM auto-recovery, brief platform
          # blip). A real outage still fails after ~15s of attempts so
          # we still get the email; one-off blips don't page anymore.
          # Re-firing the dispatcher is safe: claimPost()'s composite
          # PK in the idempotency ledger short-circuits any duplicate
          # window.
          curl -sS -X POST "$URL" \
            -H "x-dispatch-secret: ${{ secrets.DISPATCH_SECRET }}" \
            -w "\nHTTP %{http_code}\n" \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --fail-with-body
