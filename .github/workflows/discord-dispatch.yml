name: Discord Bot Dispatch (manual emergency lever)

# Manual-only fire path for the Discord dispatcher. The scheduled cron has
# moved to Railway (service `discord-cron`, schedule `*/5 * * * *`) because
# GitHub Actions cron skewed 1-4 hours on the free tier, which made it
# unusable as a precise scheduler even for the 6-hour catch-up logic.
#
# This workflow stays around purely as a manual lever:
#   - If Railway has an outage, trigger this with `force=true` to push the
#     pending digests immediately.
#   - Same idempotency contract as Railway: claimPost dedupes across both
#     systems, so firing here while Railway is also running is harmless.
#
# Scheduling intentionally left disabled — re-enable only if Railway cron
# is unrecoverable; otherwise duplicate scheduled ticks just bloat logs.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore time gates and fire all enabled subs immediately."
        required: false
        type: boolean
        default: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger PlayIRL.GG dispatcher
        run: |
          URL="https://playirl.gg/api/discord/dispatch"
          if [ "${{ inputs.force }}" = "true" ]; then
            URL="${URL}?force=1"
          fi
          # --retry 3 / --retry-delay 5 / --retry-all-errors swallows
          # transient 5xx responses from Railway (the most common is a
          # 502 when a tick happens to hit a container mid-restart —
          # health-check recycle, OOM auto-recovery, brief platform
          # blip). A real outage still fails after ~15s of attempts so
          # we still get the email; one-off blips don't page anymore.
          # Re-firing the dispatcher is safe: claimPost()'s composite
          # PK in the idempotency ledger short-circuits any duplicate
          # window.
          curl -sS -X POST "$URL" \
            -H "x-dispatch-secret: ${{ secrets.DISPATCH_SECRET }}" \
            -w "\nHTTP %{http_code}\n" \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --fail-with-body
